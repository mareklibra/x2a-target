---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    redis_port: "6379"
    redis_conf_path: /tmp/molecule_test/etc/redis/6379.conf
    redis_log_dir: /tmp/molecule_test/var/log/redis
  tasks:
    # Redis configuration file checks
    - name: Check Redis configuration file exists
      ansible.builtin.stat:
        path: "{{ redis_conf_path }}"
      register: redis_conf

    - name: Assert Redis configuration file exists
      ansible.builtin.assert:
        that:
          - redis_conf.stat.exists
          - redis_conf.stat.size > 0
        fail_msg: "Redis configuration file not found or empty"
        success_msg: "Redis configuration file exists and is not empty"

    - name: Get Redis configuration content
      ansible.builtin.slurp:
        src: "{{ redis_conf_path }}"
      register: redis_conf_content

    - name: Assert Redis password is set
      ansible.builtin.assert:
        that:
          - "'requirepass redis_secure_password_123' in (redis_conf_content.content | b64decode)"
        fail_msg: "Redis password not properly configured"
        success_msg: "Redis password is properly configured"

    - name: Assert Redis port is set
      ansible.builtin.assert:
        that:
          - "'port 6379' in (redis_conf_content.content | b64decode)"
        fail_msg: "Redis port not properly configured"
        success_msg: "Redis port is properly configured"

    - name: Assert unwanted Redis configuration lines are removed
      ansible.builtin.assert:
        that:
          - "'replica-serve-stale-data' not in (redis_conf_content.content | b64decode)"
          - "'replica-read-only' not in (redis_conf_content.content | b64decode)"
          - "'repl-ping-replica-period' not in (redis_conf_content.content | b64decode)"
          - "'client-output-buffer-limit' not in (redis_conf_content.content | b64decode)"
          - "'replica-priority' not in (redis_conf_content.content | b64decode)"
        fail_msg: "Unwanted Redis configuration lines were not removed"
        success_msg: "Unwanted Redis configuration lines were properly removed"

    # Redis log directory checks
    - name: Check Redis log directory exists
      ansible.builtin.stat:
        path: "{{ redis_log_dir }}"
      register: redis_log_dir_stat

    - name: Assert Redis log directory exists with correct permissions
      ansible.builtin.assert:
        that:
          - redis_log_dir_stat.stat.exists
          - redis_log_dir_stat.stat.isdir
          - redis_log_dir_stat.stat.mode == '0755'
        fail_msg: "Redis log directory not found or has incorrect permissions"
        success_msg: "Redis log directory exists with correct permissions"

    # Memcached configuration checks
    - name: Check Memcached Debian configuration file exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/memcached.conf
      register: memcached_conf_debian

    - name: Assert Memcached Debian configuration file exists
      ansible.builtin.assert:
        that:
          - memcached_conf_debian.stat.exists
          - memcached_conf_debian.stat.size > 0
        fail_msg: "Memcached Debian configuration file not found or empty"
        success_msg: "Memcached Debian configuration file exists and is not empty"

    - name: Check Memcached RHEL configuration file exists
      ansible.builtin.stat:
        path: /tmp/molecule_test/etc/sysconfig/memcached
      register: memcached_conf_rhel

    - name: Assert Memcached RHEL configuration file exists
      ansible.builtin.assert:
        that:
          - memcached_conf_rhel.stat.exists
          - memcached_conf_rhel.stat.size > 0
        fail_msg: "Memcached RHEL configuration file not found or empty"
        success_msg: "Memcached RHEL configuration file exists and is not empty"

    # The following checks would normally be performed but can't run in a container
    # They are tagged with molecule-notest so they won't run during molecule testing

    - name: Check Redis service status
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert Redis service is running
      ansible.builtin.assert:
        that:
          - "'redis-server@6379.service' in ansible_facts.services"
          - "ansible_facts.services['redis-server@6379.service'].state == 'running'"
        fail_msg: "Redis service is not running"
        success_msg: "Redis service is running"
      tags: molecule-notest

    - name: Check Redis connectivity
      ansible.builtin.command: redis-cli -p 6379 -a 'redis_secure_password_123' ping
      register: redis_ping
      changed_when: false
      tags: molecule-notest

    - name: Assert Redis responds to ping
      ansible.builtin.assert:
        that:
          - "'PONG' in redis_ping.stdout"
        fail_msg: "Redis is not responding to ping"
        success_msg: "Redis is responding to ping"
      tags: molecule-notest

    - name: Check Redis port is listening
      ansible.builtin.wait_for:
        port: 6379
        state: started
        timeout: 5
      tags: molecule-notest

    - name: Check Memcached service status
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert Memcached service is running
      ansible.builtin.assert:
        that:
          - "'memcached.service' in ansible_facts.services"
          - "ansible_facts.services['memcached.service'].state == 'running'"
        fail_msg: "Memcached service is not running"
        success_msg: "Memcached service is running"
      tags: molecule-notest

    - name: Check Memcached port is listening
      ansible.builtin.wait_for:
        port: 11211
        state: started
        timeout: 5
      tags: molecule-notest