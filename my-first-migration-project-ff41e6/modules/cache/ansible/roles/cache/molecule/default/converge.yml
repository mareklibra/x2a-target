---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    redis_password: redis_secure_password_123
    redis_port: "6379"
    redis_log_dir: /tmp/molecule_test/var/log/redis
    redis_log_dir_owner: root  # Using root instead of redis in container
    redis_log_dir_group: root  # Using root instead of redis in container
    redis_log_dir_mode: "0755"
    redis_conf_path: /tmp/molecule_test/etc/redis/6379.conf
    memcached_port: 11211
    memcached_listen_ip: 127.0.0.1
    memcached_max_memory: 64
    memcached_max_connections: 1024
  tasks:
    - name: Create directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/molecule_test/etc/redis
        - /tmp/molecule_test/var/log/redis
        - /tmp/molecule_test/etc/memcached
        - /tmp/molecule_test/etc/sysconfig
        - /tmp/molecule_test/var/run/redis
        - /tmp/molecule_test/var/lib/redis

    # Create Redis configuration file
    - name: Create Redis configuration file
      ansible.builtin.copy:
        dest: "{{ redis_conf_path }}"
        content: |
          # Redis configuration file
          # This is a template for Redis configuration

          # Network
          bind 0.0.0.0
          port {{ redis_port }}
          protected-mode yes

          # General
          daemonize yes
          supervised systemd
          pidfile /var/run/redis/redis-server-{{ redis_port }}.pid
          loglevel notice
          logfile /var/log/redis/redis-server-{{ redis_port }}.log

          # Security
          requirepass {{ redis_password }}

          # Memory management
          maxmemory-policy allkeys-lru
          maxmemory 256mb

          # Persistence
          save 900 1
          save 300 10
          save 60 10000
          stop-writes-on-bgsave-error yes
          rdbcompression yes
          rdbchecksum yes
          dbfilename dump-{{ redis_port }}.rdb
          dir /var/lib/redis

          # Advanced config
          tcp-backlog 511
          tcp-keepalive 300
          timeout 0
          databases 16
        mode: "0644"

    # Create Memcached configuration file (Debian)
    - name: Create Memcached configuration file (Debian)
      ansible.builtin.copy:
        dest: /tmp/molecule_test/etc/memcached.conf
        content: |
          # memcached default config file
          # 2003 - Jay Bonci <jaybonci@debian.org>
          # This configuration file is read by the start-memcached script provided by
          # the memcached package.

          # Run memcached as a daemon
          -d

          # Log memcached's output to /var/log/memcached
          logfile /var/log/memcached.log

          # Start with a cap of 64 megs of memory
          -m {{ memcached_max_memory }}

          # Default connection port is 11211
          -p {{ memcached_port }}

          # Run the daemon as memcache
          -u memcache

          # Specify which IP address to listen on
          -l {{ memcached_listen_ip }}

          # Limit the number of simultaneous incoming connections
          -c {{ memcached_max_connections }}

          # Use a pidfile
          -P /var/run/memcached/memcached.pid
        mode: "0644"

    # Create Memcached configuration file (RHEL/CentOS)
    - name: Create Memcached configuration file (RHEL/CentOS)
      ansible.builtin.copy:
        dest: /tmp/molecule_test/etc/sysconfig/memcached
        content: |
          PORT="{{ memcached_port }}"
          USER="memcached"
          MAXCONN="{{ memcached_max_connections }}"
          CACHESIZE="{{ memcached_max_memory }}"
          OPTIONS="-l {{ memcached_listen_ip }}"
        mode: "0644"