---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    redis_port: "6379"
    redis_log_dir: /var/log/redis
    redis_conf_file: "/etc/redis/6379.conf"
    memcached_port: "11211"
  tasks:
    # Redis configuration verification
    - name: Check Redis configuration file exists
      ansible.builtin.stat:
        path: "/tmp/molecule_test{{ redis_conf_file }}"
      register: redis_conf

    - name: Assert Redis configuration file exists
      ansible.builtin.assert:
        that:
          - redis_conf.stat.exists
          - redis_conf.stat.size > 0
        fail_msg: "Redis configuration file not found"
        success_msg: "Redis configuration file exists"

    - name: Get Redis configuration content
      ansible.builtin.slurp:
        src: "/tmp/molecule_test{{ redis_conf_file }}"
      register: redis_conf_content
      when: redis_conf.stat.exists

    - name: Assert Redis configuration contains required settings
      ansible.builtin.assert:
        that:
          - redis_conf_decoded.find('port 6379') != -1
          - redis_conf_decoded.find('requirepass') != -1
          - redis_conf_decoded.find('replica-serve-stale-data') == -1
          - redis_conf_decoded.find('replica-read-only') == -1
          - redis_conf_decoded.find('repl-ping-replica-period') == -1
          - redis_conf_decoded.find('client-output-buffer-limit') == -1
          - redis_conf_decoded.find('replica-priority') == -1
        fail_msg: "Redis configuration does not contain required settings"
        success_msg: "Redis configuration contains required settings"
      vars:
        redis_conf_decoded: "{{ redis_conf_content.content | b64decode }}"
      when: redis_conf.stat.exists

    # Redis log directory verification
    - name: Check Redis log directory exists
      ansible.builtin.stat:
        path: "/tmp/molecule_test{{ redis_log_dir }}"
      register: redis_log_dir_stat

    - name: Assert Redis log directory exists
      ansible.builtin.assert:
        that:
          - redis_log_dir_stat.stat.exists
          - redis_log_dir_stat.stat.isdir
        fail_msg: "Redis log directory not found"
        success_msg: "Redis log directory exists"

    # Redis log file verification
    - name: Check Redis log file exists
      ansible.builtin.stat:
        path: "/tmp/molecule_test{{ redis_log_dir }}/redis_{{ redis_port }}.log"
      register: redis_log_file

    - name: Assert Redis log file exists
      ansible.builtin.assert:
        that:
          - redis_log_file.stat.exists
        fail_msg: "Redis log file not found"
        success_msg: "Redis log file exists"

    # Memcached configuration verification
    - name: Check Memcached configuration file exists
      ansible.builtin.stat:
        path: "/tmp/molecule_test/etc/memcached.conf"
      register: memcached_conf

    - name: Assert Memcached configuration file exists
      ansible.builtin.assert:
        that:
          - memcached_conf.stat.exists
          - memcached_conf.stat.size > 0
        fail_msg: "Memcached configuration file not found"
        success_msg: "Memcached configuration file exists"

    - name: Get Memcached configuration content
      ansible.builtin.slurp:
        src: "/tmp/molecule_test/etc/memcached.conf"
      register: memcached_conf_content
      when: memcached_conf.stat.exists

    - name: Assert Memcached configuration contains required settings
      ansible.builtin.assert:
        that:
          - memcached_conf_decoded.find('-p 11211') != -1
          - memcached_conf_decoded.find('-m 64') != -1
          - memcached_conf_decoded.find('-c 1024') != -1
        fail_msg: "Memcached configuration does not contain required settings"
        success_msg: "Memcached configuration contains required settings"
      vars:
        memcached_conf_decoded: "{{ memcached_conf_content.content | b64decode }}"
      when: memcached_conf.stat.exists

    # Service status checks (these will be skipped in container)
    - name: Check Redis service status
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert Redis service is running
      ansible.builtin.assert:
        that:
          - "'redis@6379.service' in ansible_facts.services"
          - "ansible_facts.services['redis@6379.service'].state == 'running'"
        fail_msg: "Redis service is not running"
        success_msg: "Redis service is running"
      tags: molecule-notest

    - name: Check Memcached service status
      ansible.builtin.service_facts:
      tags: molecule-notest

    - name: Assert Memcached service is running
      ansible.builtin.assert:
        that:
          - "'memcached.service' in ansible_facts.services"
          - "ansible_facts.services['memcached.service'].state == 'running'"
        fail_msg: "Memcached service is not running"
        success_msg: "Memcached service is running"
      tags: molecule-notest

    # Port listening checks (these will be skipped in container)
    - name: Check Redis port is listening
      ansible.builtin.wait_for:
        port: "{{ redis_port }}"
        timeout: 1
      ignore_errors: true
      register: redis_port_check
      tags: molecule-notest

    - name: Assert Redis port is listening
      ansible.builtin.assert:
        that:
          - redis_port_check is success
        fail_msg: "Redis port {{ redis_port }} is not listening"
        success_msg: "Redis port {{ redis_port }} is listening"
      tags: molecule-notest

    - name: Check Memcached port is listening
      ansible.builtin.wait_for:
        port: "{{ memcached_port }}"
        timeout: 1
      ignore_errors: true
      register: memcached_port_check
      tags: molecule-notest

    - name: Assert Memcached port is listening
      ansible.builtin.assert:
        that:
          - memcached_port_check is success
        fail_msg: "Memcached port {{ memcached_port }} is not listening"
        success_msg: "Memcached port {{ memcached_port }} is listening"
      tags: molecule-notest