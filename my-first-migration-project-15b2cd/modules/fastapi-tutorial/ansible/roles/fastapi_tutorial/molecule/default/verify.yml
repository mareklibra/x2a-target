- name: Verify
  hosts: all
  gather_facts: false
  tasks:
  - name: Check application directory exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial
    register: app_dir
  - name: Assert application directory was created
    ansible.builtin.assert:
      that:
      - app_dir.stat.exists
      - app_dir.stat.isdir
      fail_msg: Application directory not found
      success_msg: Application directory exists
  - name: Check Python virtual environment exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial/venv/bin/python
    register: venv_python
  - name: Assert Python virtual environment was created
    ansible.builtin.assert:
      that:
      - venv_python.stat.exists
      - venv_python.stat.executable
      fail_msg: Python virtual environment not found
      success_msg: Python virtual environment exists
  - name: Check environment configuration file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/opt/fastapi-tutorial/.env
    register: env_file
  - name: Assert environment file was created
    ansible.builtin.assert:
      that:
      - env_file.stat.exists
      fail_msg: Environment file not found
      success_msg: Environment file exists
  - name: Get environment file content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/opt/fastapi-tutorial/.env
    register: env_content
    when: env_file.stat.exists
  - name: Assert environment file has correct content
    ansible.builtin.assert:
      that:
      - env_decoded.find('PROJECT_NAME="FastAPI Tutorial"') != -1
      - env_decoded.find('API_VERSION=1.0.0') != -1
      - env_decoded.find('DATABASE_URL=postgresql://fastapi:fastapi_password@localhost/fastapi_db') != -1
      fail_msg: Environment file does not have expected content
      success_msg: Environment file has correct content
    vars:
      env_decoded: '{{ env_content.content | b64decode }}'
    when: env_file.stat.exists
  - name: Check systemd service file exists
    ansible.builtin.stat:
      path: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
    register: service_file
  - name: Assert service file was created
    ansible.builtin.assert:
      that:
      - service_file.stat.exists
      fail_msg: Service file not found
      success_msg: Service file exists
  - name: Get service file content
    ansible.builtin.slurp:
      src: /tmp/molecule_test/etc/systemd/system/fastapi-tutorial.service
    register: service_content
    when: service_file.stat.exists
  - name: Assert service file has correct content
    ansible.builtin.assert:
      that:
      - service_decoded.find('ExecStart=/tmp/molecule_test/opt/fastapi-tutorial/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000') != -1
      - service_decoded.find('WorkingDirectory=/tmp/molecule_test/opt/fastapi-tutorial') != -1
      - service_decoded.find('After=network.target postgresql.service') != -1
      fail_msg: Service file does not have expected content
      success_msg: Service file has correct content
    vars:
      service_decoded: '{{ service_content.content | b64decode }}'
    when: service_file.stat.exists
  - name: Check PostgreSQL service is running
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert PostgreSQL service is active
    ansible.builtin.assert:
      that:
      - '''postgresql.service'' in ansible_facts.services'
      - ansible_facts.services['postgresql.service'].state == 'running'
      fail_msg: PostgreSQL service is not running
      success_msg: PostgreSQL service is running
    tags: molecule-notest
  - name: Check FastAPI service is running
    ansible.builtin.service_facts: null
    tags: molecule-notest
  - name: Assert FastAPI service is active
    ansible.builtin.assert:
      that:
      - '''fastapi-tutorial.service'' in ansible_facts.services'
      - ansible_facts.services['fastapi-tutorial.service'].state == 'running'
      fail_msg: FastAPI service is not running
      success_msg: FastAPI service is running
    tags: molecule-notest
  - name: Check FastAPI port is listening
    ansible.builtin.wait_for:
      port: 8000
      timeout: 5
    tags: molecule-notest
  - name: Check FastAPI application health
    ansible.builtin.uri:
      url: http://localhost:8000/
      status_code: 200
    tags: molecule-notest
  - name: Check FastAPI documentation endpoint
    ansible.builtin.uri:
      url: http://localhost:8000/docs
      status_code: 200
    tags: molecule-notest
