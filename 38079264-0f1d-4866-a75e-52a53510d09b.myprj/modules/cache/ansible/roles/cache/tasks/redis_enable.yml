---
- name: Enable and start Redis services
  ansible.builtin.service:
    name: redis-{{ item.name }}
    state: started
    enabled: true
  loop: "{{ redis_instances }}"
  when: ansible_service_mgr != 'systemd'
- name: Enable and start Redis systemd services
  ansible.builtin.systemd:
    name: redis@{{ item.name }}
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ redis_instances }}"
  when: ansible_service_mgr == 'systemd'
