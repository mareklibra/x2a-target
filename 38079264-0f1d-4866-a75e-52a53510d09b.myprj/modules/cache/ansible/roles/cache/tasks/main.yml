---
- name: Install memcached package
  ansible.builtin.package:
    name: memcached
    state: present
- name: Configure memcached
  ansible.builtin.template:
    src: memcached.conf.j2
    dest: /etc/memcached.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart memcached
- name: Ensure memcached service is enabled and running
  ansible.builtin.service:
    name: memcached
    state: started
    enabled: true
- name: Create Redis log directory
  ansible.builtin.file:
    path: /var/log/redis
    owner: redis
    group: redis
    mode: "0755"
    state: directory
    recurse: true
- name: Install Redis package
  ansible.builtin.package:
    name: redis-server
    state: present
- name: Create Redis configuration directory
  ansible.builtin.file:
    path: /etc/redis
    state: directory
    owner: redis
    group: redis
    mode: "0755"
- name: Configure Redis
  ansible.builtin.template:
    src: redis.conf.j2
    dest: /etc/redis/6379.conf
    owner: redis
    group: redis
    mode: "0644"
  vars:
    item:
      port: 6379
      requirepass: redis_secure_password_123
      logfile: /var/log/redis/redis-server.log
      dir: /var/lib/redis
  notify: restart redis
- name: Install Redis systemd service file
  ansible.builtin.template:
    src: redis@.service.j2
    dest: /lib/systemd/system/redis@.service
    owner: root
    group: root
    mode: "0644"
  notify: restart redis
- name: Fix Redis configuration
  ansible.builtin.lineinfile:
    path: /etc/redis/6379.conf
    regexp: "{{ item }}"
    state: absent
  loop:
    - ^replica-serve-stale-data.*$
    - ^replica-read-only.*$
    - ^repl-ping-replica-period.*$
    - ^client-output-buffer-limit.*$
    - ^replica-priority.*$
  notify: restart redis
- name: Ensure Redis service is enabled and running
  ansible.builtin.service:
    name: redis@6379
    state: started
    enabled: true
