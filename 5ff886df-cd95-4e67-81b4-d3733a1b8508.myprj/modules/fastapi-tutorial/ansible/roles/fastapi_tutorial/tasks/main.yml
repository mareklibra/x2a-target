---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ fastapi_app_path }}"
    owner: root
    group: root
    mode: "0755"
    state: directory
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ fastapi_git_repo }}"
    dest: "{{ fastapi_app_path }}"
    version: "{{ fastapi_git_branch }}"
    update: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ fastapi_app_path }}/venv
    creates: "{{ fastapi_app_path }}/venv"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ fastapi_app_path }}/requirements.txt"
    virtualenv: "{{ fastapi_app_path }}/venv"
    state: present
- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: postgresql
    enabled: true
    state: started
- name: Create PostgreSQL user and database
  ansible.builtin.shell:
    cmd: 'sudo -u postgres psql -c "CREATE USER {{ fastapi_db_user }} WITH PASSWORD ''{{ fastapi_db_password }}'';" || true

      sudo -u postgres psql -c "CREATE DATABASE {{ fastapi_db_name }} OWNER {{ fastapi_db_user }};" || true

      sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ fastapi_db_name }} TO {{ fastapi_db_user }};" || true

      '
  changed_when: false
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ fastapi_app_path }}/.env"
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
- name: Enable and start FastAPI service
  ansible.builtin.service:
    name: fastapi-tutorial
    enabled: true
    state: started
