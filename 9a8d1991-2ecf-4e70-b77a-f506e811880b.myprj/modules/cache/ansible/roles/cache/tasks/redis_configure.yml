---
- name: Create Redis configuration files
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_conf_dir }}/{{ item.port }}.conf"
    owner: "{{ redis_user }}"
    group: "{{ redis_group }}"
    mode: "0640"
  loop: "{{ redis_servers }}"
  loop_control:
    label: "{{ item.port }}"
  notify: restart redis
  tags:
    - redis
    - config
- name: Create Redis systemd service files
  ansible.builtin.template:
    src: redis@.service.j2
    dest: "{{ redis_systemd_path }}/redis@.service"
    owner: root
    group: root
    mode: "0644"
  when: redis_init_system == 'systemd'
  notify: restart redis
  tags:
    - redis
    - config
- name: Create Redis init script files
  ansible.builtin.template:
    src: redis.init.j2
    dest: /etc/init.d/redis{{ item.port }}
    owner: root
    group: root
    mode: "0755"
  loop: "{{ redis_servers }}"
  loop_control:
    label: "{{ item.port }}"
  when: redis_init_system == 'init'
  notify: restart redis
  tags:
    - redis
    - config
- name: Create Redis upstart files
  ansible.builtin.template:
    src: redis.upstart.conf.j2
    dest: /etc/init/redis{{ item.port }}.conf
    owner: root
    group: root
    mode: "0644"
  loop: "{{ redis_servers }}"
  loop_control:
    label: "{{ item.port }}"
  when: redis_init_system == 'upstart'
  notify: restart redis
  tags:
    - redis
    - config
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: redis_init_system == 'systemd'
  tags:
    - redis
    - service
