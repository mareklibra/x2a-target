---
redis_user: redis
redis_group: redis
redis_package_install: false
redis_package_name: redis-server
redis_version: 6.2.6
redis_dependencies:
  - build-essential
  - tcl
redis_dir_mode: "0755"
redis_conf_dir: /etc/redis
redis_data_dir: /var/lib/redis
redis_log_dir: /var/log/redis
redis_systemd_path: /etc/systemd/system
redis_disable_os_default: true
redis_enable_service: true
redis_init_system: systemd
redis_servers:
  - port: 6379
    address: 0.0.0.0
    databases: 16
    unixsocket: false
    timeout: 0
    loglevel: notice
    rdbcompression: "yes"
    save:
      - 900 1
      - 300 10
      - 60 10000
    maxmemory: "0"
    maxmemory_policy: volatile-lru
    appendonly: "no"
    appendfsync: everysec
    activerehashing: "yes"
