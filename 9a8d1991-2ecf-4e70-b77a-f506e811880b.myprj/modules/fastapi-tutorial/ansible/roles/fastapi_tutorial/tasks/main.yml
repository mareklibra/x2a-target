---
- name: Install required system packages
  ansible.builtin.package:
    name: "{{ fastapi_system_packages }}"
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: "{{ fastapi_app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: "{{ fastapi_git_repo }}"
    dest: "{{ fastapi_app_dir }}"
    version: "{{ fastapi_git_branch }}"
    force: true
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ fastapi_python_venv }}
    creates: "{{ fastapi_python_venv }}"
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ fastapi_app_dir }}/requirements.txt"
    virtualenv: "{{ fastapi_python_venv }}"
    state: present
- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true
- name: Create PostgreSQL user
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE USER {{ fastapi_db_user }} WITH PASSWORD '{{ fastapi_db_password }}';" || true
  changed_when: false
- name: Create PostgreSQL database
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "CREATE DATABASE {{ fastapi_db_name }} OWNER {{ fastapi_db_user }};" || true
  changed_when: false
- name: Grant privileges on database
  ansible.builtin.command:
    cmd: sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ fastapi_db_name }} TO {{ fastapi_db_user }};" || true
  changed_when: false
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ fastapi_app_dir }}/.env"
    owner: root
    group: root
    mode: "0644"
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
- name: Enable and start FastAPI tutorial service
  ansible.builtin.service:
    name: fastapi-tutorial
    state: started
    enabled: true
