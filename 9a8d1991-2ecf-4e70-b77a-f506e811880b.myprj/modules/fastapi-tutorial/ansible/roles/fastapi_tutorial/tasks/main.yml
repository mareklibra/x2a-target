---
- name: Install Python 3 and required system packages
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - postgresql
      - postgresql-contrib
      - libpq-dev
    state: present
- name: Create application directory
  ansible.builtin.file:
    path: /opt/fastapi-tutorial
    owner: root
    group: root
    mode: "0755"
    state: directory
    recurse: true
- name: Clone FastAPI tutorial repository
  ansible.builtin.git:
    repo: https://github.com/dibanez/fastapi_tutorial.git
    dest: /opt/fastapi-tutorial
    version: main
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/fastapi-tutorial/venv
    creates: /opt/fastapi-tutorial/venv
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/fastapi-tutorial/requirements.txt
    virtualenv: /opt/fastapi-tutorial/venv
    state: present
- name: Configure PostgreSQL service
  ansible.builtin.service:
    name: postgresql
    enabled: true
    state: started
- name: Create database user and database
  ansible.builtin.shell:
    cmd: 'sudo -u postgres psql -c "CREATE USER fastapi WITH PASSWORD ''fastapi_password'';" || true

      sudo -u postgres psql -c "CREATE DATABASE fastapi_db OWNER fastapi;" || true

      sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE fastapi_db TO fastapi;" || true

      '
  changed_when: false
- name: Create environment configuration file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/fastapi-tutorial/.env
    mode: "0644"
    owner: root
    group: root
- name: Create systemd service file
  ansible.builtin.template:
    src: fastapi-tutorial.service.j2
    dest: /etc/systemd/system/fastapi-tutorial.service
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd daemon
- name: Enable and start the FastAPI tutorial service
  ansible.builtin.service:
    name: fastapi-tutorial
    enabled: true
    state: started
