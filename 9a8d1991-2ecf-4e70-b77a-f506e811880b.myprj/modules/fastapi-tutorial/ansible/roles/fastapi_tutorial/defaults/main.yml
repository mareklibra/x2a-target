---
fastapi_app_dir: /opt/fastapi-tutorial
fastapi_git_repo: https://github.com/dibanez/fastapi_tutorial.git
fastapi_git_branch: main
fastapi_app_port: 8000
fastapi_app_host: 0.0.0.0
fastapi_python_venv: "{{ fastapi_app_dir }}/venv"
fastapi_db_name: fastapi_db
fastapi_db_user: fastapi
fastapi_db_password: fastapi_password
fastapi_db_host: localhost
fastapi_project_name: FastAPI Tutorial
fastapi_api_version: 1.0.0
fastapi_database_url: postgresql://{{ fastapi_db_user }}:{{ fastapi_db_password }}@{{ fastapi_db_host }}/{{ fastapi_db_name }}
fastapi_system_packages:
  - python3
  - python3-pip
  - python3-venv
  - git
  - postgresql
  - postgresql-contrib
  - libpq-dev
